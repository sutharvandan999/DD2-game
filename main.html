<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD2 — Dilip's Dugong Domination</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Outfit',sans-serif;
  background:#010d1a;color:#d8f0ff;
  display:flex;align-items:center;justify-content:center;
}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* scanline */
body::after{
  content:'';position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);
}

.center{
  position:relative;z-index:1;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
  padding:24px 20px;
  width:100%;max-width:520px;
}

/* ── DUGONG ── */
.dugong-wrap{
  margin-bottom:26px;
  animation:float 3.8s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}

/* ── BADGE ── */
.badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:4px 13px 4px 9px;
  background:rgba(0,194,255,.08);border:1px solid rgba(0,194,255,.22);
  border-radius:999px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:#00c2ff;font-weight:600;margin-bottom:20px;
  font-family:'JetBrains Mono',monospace;
}
.bdot{width:6px;height:6px;border-radius:50%;background:#00c2ff;box-shadow:0 0 8px #00c2ff;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.28}}

/* ── TITLE ── */
.label-dd{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(11px,1.6vw,14px);letter-spacing:.24em;text-transform:uppercase;
  color:rgba(0,194,255,.42);margin-bottom:8px;
}
.title{
  font-size:clamp(46px,8vw,100px);
  font-weight:900;letter-spacing:-.04em;line-height:.95;margin-bottom:6px;
}
.tw{color:#fff}
.to{
  background:linear-gradient(90deg,#00c2ff,#b0fff2 55%,#00c2ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sub{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(10px,1.4vw,13px);color:rgba(0,194,255,.42);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:44px;
}

/* ── PLATFORM BUTTONS ── */
.btn-row{
  display:flex;gap:16px;width:100%;
  justify-content:center;
  flex-wrap:wrap;
}
.pbt{
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  flex:1;min-width:180px;max-width:220px;
  padding:26px 18px 22px;
  background:rgba(2,21,37,0.7);
  border:1.5px solid rgba(0,194,255,.28);
  border-radius:18px;
  text-decoration:none;color:#d8f0ff;
  cursor:pointer;transition:all .28s;
  overflow:hidden;
  backdrop-filter:blur(6px);
}
.pbt::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#00c2ff,transparent);
  transform:scaleX(0);transform-origin:center;transition:transform .3s;
}
.pbt:hover::before,.pbt:focus::before{transform:scaleX(1)}
.pbt:hover,.pbt:focus{
  border-color:rgba(0,194,255,.7);
  background:rgba(3,32,53,0.85);
  transform:translateY(-5px);
  box-shadow:0 16px 40px rgba(0,120,200,.3), 0 0 0 1px rgba(0,194,255,.15);
  outline:none;
}
.pbt:active{transform:translateY(-2px)}

/* corner accents */
.pbt .cc{position:absolute;width:9px;height:9px;border-color:#00c2ff;border-style:solid;transition:all .28s;opacity:.6}
.pbt:hover .cc,.pbt:focus .cc{opacity:1;width:13px;height:13px}
.pbt .cc.tl{top:7px;left:7px;border-width:1.5px 0 0 1.5px}
.pbt .cc.tr{top:7px;right:7px;border-width:1.5px 1.5px 0 0}
.pbt .cc.bl{bottom:7px;left:7px;border-width:0 0 1.5px 1.5px}
.pbt .cc.br{bottom:7px;right:7px;border-width:0 1.5px 1.5px 0}

.pbt-icon{font-size:36px;line-height:1;margin-bottom:4px}
.pbt-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(0,194,255,.5);margin-bottom:2px;
}
.pbt-name{
  font-size:17px;font-weight:800;color:#fff;letter-spacing:-.01em;
}
.pbt-desc{font-size:11px;color:rgba(100,168,200,.7);margin-top:4px;line-height:1.4}

/* ── FOOTER LINE ── */
.foot{
  margin-top:32px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(0,194,255,.25);
}
.foot span{color:rgba(0,194,255,.48)}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="center">

  <!-- floating dugong + rider -->
  <div class="dugong-wrap">
    <svg width="170" height="120" viewBox="0 0 180 130">
      <ellipse cx="90" cy="75" rx="70" ry="35" fill="rgba(0,194,255,0.06)"/>
      <polygon points="22,75 6,93 6,57" fill="#0090bb" opacity=".9"/>
      <ellipse cx="90" cy="75" rx="62" ry="30" fill="#00a8d4"/>
      <ellipse cx="90" cy="73" rx="40" ry="19" fill="#b0fff2" opacity=".7"/>
      <ellipse cx="140" cy="74" rx="26" ry="17" fill="#00a8d4"/>
      <ellipse cx="162" cy="74" rx="13" ry="9" fill="#b0fff2" opacity=".75"/>
      <ellipse cx="90" cy="51" rx="20" ry="9" fill="#0090bb" opacity=".72"/>
      <ellipse cx="90" cy="99" rx="20" ry="9" fill="#0090bb" opacity=".72"/>
      <circle cx="148" cy="64" r="7" fill="white"/>
      <circle cx="148" cy="64" r="4.4" fill="#010d1a"/>
      <circle cx="146" cy="62" r="1.7" fill="white"/>
      <circle cx="160" cy="67" r="2.4" fill="#010d1a" opacity=".5"/>
      <!-- rider -->
      <ellipse cx="90" cy="50" rx="13" ry="17" fill="#2563eb"/>
      <circle cx="90" cy="28" r="13" fill="#c87840"/>
      <path d="M78 23 Q90 13 102 23" fill="none" stroke="#2d1000" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="85" cy="26" r="2" fill="#2d1000"/>
      <circle cx="95" cy="26" r="2" fill="#2d1000"/>
      <line x1="83" y1="32" x2="97" y2="32" stroke="#2d1000" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M85 36 Q90 40 95 36" fill="none" stroke="#2d1000" stroke-width="1.4" stroke-linecap="round"/>
      <!-- waves -->
      <path d="M18 112 Q33 104 48 112 Q63 120 78 112 Q93 104 108 112 Q123 120 138 112 Q153 104 168 112" fill="none" stroke="rgba(0,194,255,0.3)" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M26 124 Q42 117 58 124 Q74 131 90 124 Q106 117 122 124 Q138 131 154 124" fill="none" stroke="rgba(0,194,255,0.15)" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="badge"><span class="bdot"></span>Launched 20th June 2026</div>

  <div class="label-dd">DD2</div>
  <div class="title">
    <span class="tw">Dilip's</span><br>
    <span class="to">Dugong</span>
  </div>
  <div class="sub">Domination &nbsp;·&nbsp; Ocean World Edition</div>

  <!-- TWO PLATFORM BUTTONS -->
  <div class="btn-row">

    <a href="windows.html" class="pbt">
      <span class="cc tl"></span><span class="cc tr"></span>
      <span class="cc bl"></span><span class="cc br"></span>
      <div class="pbt-icon">🖥️</div>
      <div class="pbt-label">Platform</div>
      <div class="pbt-name">Windows</div>
      <div class="pbt-desc">Full desktop experience</div>
    </a>

    <a href="mobile.html" class="pbt">
      <span class="cc tl"></span><span class="cc tr"></span>
      <span class="cc bl"></span><span class="cc br"></span>
      <div class="pbt-icon">📱</div>
      <div class="pbt-label">Platform</div>
      <div class="pbt-name">Mobile</div>
      <div class="pbt-desc">Optimised for your phone</div>
    </a>

  </div>

  <div class="foot">By <span>Suthar Vandan</span> &nbsp;·&nbsp; <span>DD2 © 2026</span></div>

</div>

<script>
const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
let W,H,bubbles=[],caustics=[],rays=[];
function mkB(){bubbles=[];for(let i=0;i<42;i++)bubbles.push({x:Math.random()*W,y:Math.random()*H,r:1.2+Math.random()*4.2,spd:.2+Math.random()*.5,drift:(Math.random()-.5)*.3,alpha:.05+Math.random()*.13,wb:Math.random()*Math.PI*2,ws:.01+Math.random()*.018})}
function mkC(){caustics=[];for(let i=0;i<14;i++)caustics.push({x:Math.random()*W,y:Math.random()*H*.8,r:22+Math.random()*75,phase:Math.random()*Math.PI*2,spd:.007+Math.random()*.01,alpha:.02+Math.random()*.032,drift:(Math.random()-.5)*.11})}
function mkR(){rays=[];for(let i=0;i<6;i++)rays.push({x:(i/5)*W*1.1-W*.05,w:22+Math.random()*46,alpha:.013+Math.random()*.018,phase:Math.random()*Math.PI*2,spd:.003+Math.random()*.005})}
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;mkB();mkC();mkR()}
window.addEventListener('resize',resize);resize();
let t=0;
function draw(){
  t+=.016;ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#010d1a');g.addColorStop(.3,'#021525');g.addColorStop(.7,'#032035');g.addColorStop(1,'#010a14');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<5;i++){const y=H*(.1+i*.18)+Math.sin(t*.28+i)*10;const bg=ctx.createLinearGradient(0,y-35,0,y+35);bg.addColorStop(0,'rgba(0,80,120,0)');bg.addColorStop(.5,`rgba(0,${52+i*7},${88+i*9},0.04)`);bg.addColorStop(1,'rgba(0,80,120,0)');ctx.fillStyle=bg;ctx.fillRect(0,y-35,W,70)}
  rays.forEach(r=>{const a=r.alpha*(.6+.4*Math.sin(r.phase+t*r.spd));const rx=r.x+Math.sin(t*.18+r.phase)*24;const hw=r.w/2+Math.sin(t*r.spd+r.phase)*9;const rg=ctx.createLinearGradient(0,0,0,H*.8);rg.addColorStop(0,`rgba(0,165,215,${a})`);rg.addColorStop(.6,`rgba(0,125,188,${a*.3})`);rg.addColorStop(1,'rgba(0,75,135,0)');ctx.beginPath();ctx.moveTo(rx-hw*.22,0);ctx.lineTo(rx+hw*.22,0);ctx.lineTo(rx+hw*2.1,H*.8);ctx.lineTo(rx-hw*2.1,H*.8);ctx.closePath();ctx.fillStyle=rg;ctx.fill()});
  caustics.forEach(c=>{const pulse=.6+.4*Math.sin(c.phase+t*c.spd);const r=c.r*pulse;c.x+=c.drift;if(c.x>W+110)c.x=-110;if(c.x<-110)c.x=W+110;const cg=ctx.createRadialGradient(c.x,c.y,r*.55,c.x,c.y,r);cg.addColorStop(0,'rgba(0,194,255,0)');cg.addColorStop(.65,`rgba(0,194,255,${c.alpha*pulse})`);cg.addColorStop(1,'rgba(0,194,255,0)');ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();ctx.beginPath();ctx.arc(c.x,c.y,r*.73,0,Math.PI*2);ctx.strokeStyle=`rgba(0,218,255,${c.alpha*.42*pulse})`;ctx.lineWidth=.6;ctx.stroke()});
  bubbles.forEach(b=>{b.wb+=b.ws;b.y-=b.spd;b.x+=Math.sin(b.wb)*b.drift;if(b.y<-12){b.y=H+10;b.x=Math.random()*W}ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle=`rgba(0,215,238,${b.alpha})`;ctx.lineWidth=.85;ctx.stroke();ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.27,0,Math.PI*2);ctx.fillStyle=`rgba(175,255,255,${b.alpha*.52})`;ctx.fill()});
  const fg=ctx.createLinearGradient(0,H*.82,0,H);fg.addColorStop(0,'rgba(0,55,95,0)');fg.addColorStop(1,'rgba(0,25,45,0.17)');ctx.fillStyle=fg;ctx.fillRect(0,H*.82,W,H*.18);
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
